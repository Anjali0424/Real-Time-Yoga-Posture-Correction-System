<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - YogaMaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="auth-page">

    {% include 'navbar.html' %}

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to continue your yoga journey</p>

            <form id="loginForm" class="auth-form">

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="auth-button">Login</button>
            </form>

            <div class="auth-links">
                <p>Don't have an account? <a href="/signup">Sign up here</a></p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                <div class="footer-section">
                    <h3>YogaMaster</h3>
                    <p>Your personal AI yoga assistant</p>
                </div>

                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/about">About</a></li>
                        <li><a href="/poses">Poses</a></li>
                    </ul>
                </div>

            </div>

            <div class="footer-bottom">
                <p>&copy; 2024 YogaMaster. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- MAIN SCRIPT -->
    <script src="/js/script.js"></script>

    <!-- LOGIN LOGIC -->
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            const formData = new FormData();
            formData.append("email", email);
            formData.append("password", password);

            fetch("/login", {
                method: "POST",
                body: formData
            })
            .then(res => {
                if (res.redirected) {
                    window.location.href = res.url;  // Redirect to dashboard
                } else {
                    return res.text();
                }
            })
            .then(data => {
                if (data && data.includes("Invalid")) {
                    alert("Invalid Email or Password");
                }
            })
            .catch(() => {
                alert("Login failed.");
            });
        });
    </script>

</body>
</html>
