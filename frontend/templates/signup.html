<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - YogaMaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

    {% include 'navbar.html' %}

    <!-- SIGNUP FORM -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Start Your Journey</h2>
            <p>Create your account and begin your yoga transformation</p>

            <!-- ✅ enctype REQUIRED for image upload -->
            <form id="signupForm" class="auth-form" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>

                <!-- ✅ BIO (OPTIONAL) -->
                <div class="form-group">
                    <label>Bio <span class="optional">(optional)</span></label>
                    <textarea id="bio" rows="2"
                        placeholder="Tell something about yourself..."></textarea>
                </div>

                <!-- ✅ PROFILE PICTURE (OPTIONAL) -->
                <div class="form-group">
                    <label>Profile Picture <span class="optional">(optional)</span></label>
                    <input type="file" id="profileImage" accept="image/*">
                </div>

                <button type="submit" class="auth-button">Create Account</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="/login">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                <div class="footer-section">
                    <h3>YogaMaster</h3>
                    <p>Your personal AI yoga assistant</p>
                </div>

                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/about">About</a></li>
                        <li><a href="/poses">Poses</a></li>
                    </ul>
                </div>

            </div>

            <div class="footer-bottom">
                <p>&copy; 2024 YogaMaster. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- MAIN JS -->
    <script src="/js/script.js"></script>

    <!-- ✅ SIGNUP JAVASCRIPT LOGIC -->
    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const bio = document.getElementById("bio").value.trim();
            const profileImage = document.getElementById("profileImage").files[0];

            // Validation
            if (username.length < 2) {
                alert("Name must be at least 2 characters");
                return;
            }

            if (!email.includes("@")) {
                alert("Enter a valid email");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            const formData = new FormData();
            formData.append("username", username);
            formData.append("email", email);
            formData.append("password", password);
            formData.append("bio", bio);

            if (profileImage) {
                formData.append("profile_image", profileImage);
            }

            fetch("/signup", {
                method: "POST",
                body: formData
            })
            .then(res => {
                if (res.redirected) {
                    window.location.href = res.url;
                } else {
                    return res.text();
                }
            })
            .then(data => {
                if (data && data.includes("❌")) {
                    alert(data);
                }
            })
            .catch(() => {
                alert("Signup failed. Please try again.");
            });
        });
    </script>

</body>
</html>
