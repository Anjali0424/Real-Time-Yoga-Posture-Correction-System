<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Mode - YogaMaster</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="practice-page">

    <!-- ✅ Shared Navbar (dynamic login/logout) -->
    {% include 'navbar.html' %}

    <section class="practice-section">
        <div class="container">
            <div class="practice-layout">

                <!-- Webcam View -->
                <div class="webcam-section">
                    <div class="webcam-header">
                        <h2 id="practiceTitle">Practice Mode</h2>
                        <div class="practice-controls">
                            <button id="muteBtn" class="control-btn">🔊 Mute</button>

                            <!-- Language Dropdown -->
                            <select id="practiceLanguage" class="language-select">
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                                <option value="Marathi">Marathi</option>
                            </select>
                        </div>
                    </div>

                    <div class="webcam-container">
                        <div class="webcam-placeholder">
                            <div class="webcam-feed">
                                <div class="camera-icon">📷</div>
                                <p>Webcam Feed</p>
                                <small>AI Pose Detection Active</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Steps Panel -->
                <div class="steps-panel">
                    <div class="steps-header">
                        <h3>Practice Steps</h3>
                        <div class="session-timer">
                            <span id="timer">00:00</span>
                        </div>
                    </div>

                    <!-- Steps appear here -->
                    <div class="steps-list" id="stepsList"></div>

                    <div class="practice-controls-panel">
                        <button id="startPractice" class="control-btn primary">Start Practice</button>
                        <button id="checkStep" class="control-btn secondary" disabled>Check Current Step</button>
                        <button id="stopPractice" class="control-btn danger" disabled>Stop Practice</button>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <script src="/js/script.js"></script>

    <!-- POSE TITLE SET FROM localStorage (passed from poses.html) -->
    <script>
        // Get pose from localStorage (set by poses.html) or URL fallback
        let selectedPose = localStorage.getItem("poseName") || "Lotus Pose";
        
        // Update title
        document.getElementById("practiceTitle").innerText = "Practice: " + selectedPose;
    </script>

    <!-- MULTI-LANGUAGE + VOICE LOGIC -->
    <script>
        const languageSelect = document.getElementById("practiceLanguage");
        const stepsContainer = document.getElementById("stepsList");

        // Make these global so script.js can access them
        window.langData = {};
        window.currentLanguage = "English";
        window.isMuted = false;

        // ✅ ENSURE VOICES ARE LOADED
        // Some browsers need this to properly load system voices
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = function() {
                console.log("Voices loaded:", window.speechSynthesis.getVoices().length);
            };
        }
        // Force load voices
        window.speechSynthesis.getVoices();

        // Load language JSON
        fetch("/assets/lang.json")
            .then(res => res.json())
            .then(data => {
                window.langData = data;
                loadSteps();
            });

        // Change language
        languageSelect.addEventListener("change", function () {
            window.currentLanguage = this.value;
            loadSteps();
        });

        function loadSteps() {
            if (!window.langData[window.currentLanguage] || !window.langData[window.currentLanguage][selectedPose]) {
                stepsContainer.innerHTML = "<p>No steps available.</p>";
                return;
            }

            const steps = window.langData[window.currentLanguage][selectedPose];
            stepsContainer.innerHTML = "";

            steps.forEach((step, index) => {
                const div = document.createElement("div");
                div.className = "step-item";
                div.innerHTML = `
                    <span class="step-number">${index + 1}</span>
                    <span class="step-text">${step}</span>
                `;
                stepsContainer.appendChild(div);

                // ✅ REMOVED: auto-speak on page load
                // Speaking now handled by script.js during practice
                // speak(step);
            });
        }

        // function speak(text) {
        //     if (isMuted) return;

        //     const speech = new SpeechSynthesisUtterance(text);

        //     if (currentLanguage === "Hindi") speech.lang = "hi-IN";
        //     else if (currentLanguage === "Marathi") speech.lang = "mr-IN";
        //     else speech.lang = "en-US";

        //     window.speechSynthesis.speak(speech);
        // }
    </script>

</body>
</html>
